<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 556" width="900" height="556" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-labelledby="t d">
  <title id="t">The curator review proposal reviewer</title>
  <desc id="d">The Review screen of the curator TUI: a tab bar (Review · Search · Digest) with Review active, a proposal queue on the left with status glyphs, a detail pane on the right showing the selected digest proposal's metadata, a green pre-flight banner confirming the patch applies cleanly, and a coloured diff of the file it would create. A footer lists the key bindings.</desc>
  <style>
    .val { fill: #e6edf3; }
    .lbl { fill: #8b949e; }
    .dim { fill: #6e7681; }
    .ok  { fill: #3fb950; }
    .warn{ fill: #d29922; }
    .err { fill: #f85149; }
    .hd  { fill: #56d4dd; font-weight: 600; }
    .tab { fill: #8b949e; }
    text { font-size: 14px; white-space: pre; }
  </style>

  <rect x="8" y="8" width="884" height="540" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="32" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="30" r="6" fill="#27c93f"/>
