  <line x1="8" y1="50" x2="892" y2="50" stroke="#21262d" stroke-width="1"/>

  <!-- tab bar: Review active (reversed cyan), Search / Digest inactive -->
  <rect x="26" y="58" width="66" height="18" rx="3" fill="#56d4dd"/>
  <text x="34" y="71"><tspan fill="#0d1117" font-weight="600">Review</tspan></text>
  <text x="100" y="71"><tspan class="dim">│</tspan> <tspan class="tab">Search</tspan> <tspan class="dim">│</tspan> <tspan class="tab">Digest</tspan>     <tspan class="dim">Tab/1·2·3 switch · ? help</tspan></text>

  <!-- panes -->
  <rect x="20"  y="84" width="348" height="404" fill="none" stroke="#30363d" stroke-width="1"/>
  <rect x="380" y="84" width="504" height="404" fill="none" stroke="#30363d" stroke-width="1"/>
