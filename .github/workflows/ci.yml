# The gate suite. Runs on a clean runner with nothing but Rust — no
# webview, no model server, no database, no forge services. If a step
# here needs an external service, the quickstart promise is broken.
name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test (hermetic — no network, no models, no services)
        run: cargo test --workspace

      - name: doc (rustdoc warning-clean; missing_docs gated on kp-core)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: grep litmus (public-safety boundary)
        run: cargo run -p xtask -- litmus

      # Same instrumented run + gate as `just cov`: region coverage,
      # fail-under 80% on kp-core/kp-index/kp-librarian, report elsewhere.
      - name: coverage (region gate)
        run: |
          cargo llvm-cov --workspace --no-report
          cargo llvm-cov report --summary-only
          cargo llvm-cov report --json --summary-only --output-path target/coverage.json
          cargo run -p xtask -- coverage-gate target/coverage.json
