# The gate suite — `just ci` is the executable source of truth (run
# locally on every change): the `ci` job mirrors it step for step and
# the `license-audit` job is its `deny` recipe via the official action;
# only the secret scan is CI-side-only (it wants full git history).
# Designed for a clean runner with nothing but Rust — no webview, no
# model server, no database, no forge services. If a step here needs
# an external service, the quickstart promise is broken. NOTE: tests
# use no external network, but curator-zotero's wiremock tests bind
# loopback sockets — a sandbox denying bind() will fail them. The REAL
# model path is deliberately not here: e2e-real.yml owns it (weekly +
# release-gating), keeping the per-commit gate hermetic and fast.
name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test (hermetic — no external network, no models, no services)
        run: cargo test --workspace

      - name: doc (rustdoc warning-clean; missing_docs gated on curator-core)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: grep litmus (public-safety boundary)
        run: cargo run -p xtask -- litmus

      # The lean build must stay buildable: `curator` without the ONNX
      # embedder stack (no build-time ort download, no model fetch).
      - name: lean build check (no default features)
        run: cargo check -p curator-cli --no-default-features

      # The docs site must render: dangling links and missing anchors
      # fail here, not on Pages. (pages.yml owns the deploy.)
      - name: docs site (deterministic static build)
        run: cargo run -p xtask -- docs

      # Same instrumented run + gate as `just cov`: region coverage,
      # fail-under 80% on curator-core/curator-index/curator-librarian, report elsewhere.
      - name: coverage (region gate)
        run: |
          cargo llvm-cov --workspace --no-report
          cargo llvm-cov report --summary-only
          cargo llvm-cov report --json --summary-only --output-path target/coverage.json
          cargo run -p xtask -- coverage-gate target/coverage.json

  # `just deny`: the shipped dependency tree stays permissive-only —
  # allow-list + the one scoped exception live in deny.toml.
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses

  # Full-history secret scan. Complements (never replaces) the standing
  # rules: secrets enter via env only, config files carry none by
  # contract.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
